services:
  moto-agora-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moto-agora-website
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - TZ=America/Fortaleza
    networks:
      - moto-agora-network
    labels:
      - "com.motoagora.description=Website institucional"
      - "com.motoagora.service=web"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  moto-agora-network:
    driver: bridge
    name: moto-agora-network

